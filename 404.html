<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — Fresno Watersports</title>
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/png" href="images/logo.png">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .error-content {
      max-width: 520px;
    }
    .error-icon {
      font-size: 5rem;
      margin-bottom: 16px;
      line-height: 1;
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      background: var(--gradient-text);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      margin-bottom: 8px;
    }
    .error-title {
      font-family: var(--font-display);
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }
    .error-desc {
      color: var(--text-secondary);
      font-weight: 300;
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .error-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav scrolled">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo">
        <img src="images/logo.png" alt="Fresno Watersports">
      </a>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="fleet.html" class="nav-link">Fleet</a>
        <a href="about.html" class="nav-link">About</a>
        <a href="contact.html" class="nav-link">Contact</a>
        <a href="booking.html" class="nav-cta">Book Now</a>
      </div>
      <button class="nav-toggle" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>
  <div class="mobile-menu">
    <a href="index.html" class="nav-link">Home</a>
    <a href="fleet.html" class="nav-link">Fleet</a>
    <a href="about.html" class="nav-link">About</a>
    <a href="contact.html" class="nav-link">Contact</a>
    <a href="booking.html" class="btn btn-primary">Book Now</a>
  </div>

  <section class="error-page">
    <div class="error-content">
      <div class="error-icon">&#127754;</div>
      <div class="error-code">404</div>
      <h1 class="error-title">You've Drifted Off Course</h1>
      <p class="error-desc">This page doesn't exist — but your next lake day can. Let's get you back on the water.</p>
      <div class="error-actions">
        <a href="index.html" class="btn btn-primary">Back to Home</a>
        <a href="booking.html" class="btn btn-outline">Book a Ride</a>
      </div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
